<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #e2e8f0;
      background: #0f172a;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #1e293b;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .header .subtitle {
      color: #94a3b8;
      font-size: 11px;
      margin-top: 2px;
    }
    .status {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1e293b;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #f59e0b; }
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .section label {
      display: block;
      color: #94a3b8;
      font-size: 11px;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #64748b; }
    .btn {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #6366f1;
      color: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #4f46e5; }
    .btn.secondary {
      background: #1e293b;
      border: 1px solid #334155;
    }
    .btn.secondary:hover { background: #334155; }
    .chat-input {
      padding: 12px 16px;
    }
    .chat-input textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      resize: none;
      height: 60px;
      outline: none;
      font-family: inherit;
    }
    .chat-input textarea:focus { border-color: #6366f1; }
    .result {
      padding: 8px 16px 12px;
      font-size: 12px;
      color: #94a3b8;
      max-height: 150px;
      overflow-y: auto;
    }
    .result pre {
      white-space: pre-wrap;
      word-break: break-all;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 11px;
    }
    .result .success { color: #22c55e; }
    .result .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <h1>consumed.ai</h1>
    <div class="subtitle">Browser RPA bridge</div>
  </div>

  <div class="status" id="status">
    <span class="dot yellow" id="statusDot"></span>
    <span id="statusText">Checking...</span>
  </div>

  <div class="section" id="setup">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="Your consumed.ai API key">
    <label style="margin-top: 8px;">API URL</label>
    <input type="text" id="apiUrl" placeholder="https://api.consumed.ai">
    <button class="btn" id="saveBtn">Connect</button>
  </div>

  <div class="chat-input">
    <label>Quick command</label>
    <textarea id="command" placeholder="[stripe] list invoices&#10;extract table from this page&#10;fill #email with user@test.com"></textarea>
    <button class="btn" id="sendBtn">Execute</button>
  </div>

  <div class="result" id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
